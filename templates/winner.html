{% extends "base.html" %}
{% block content %}

<h2>🏆 Winner Prediction</h2>

<div class="card p-4">

    <!-- Team 1 -->
    <select id="team1" class="form-control mb-2" onchange="updateTossTeams()">
        <option value="">Select Team 1</option>
        {% for t in teams %}
        <option value="{{t}}">{{t}}</option>
        {% endfor %}
    </select>

    <!-- Team 2 -->
    <select id="team2" class="form-control mb-2" onchange="updateTossTeams()">
        <option value="">Select Team 2</option>
        {% for t in teams %}
        <option value="{{t}}">{{t}}</option>
        {% endfor %}
    </select>

    <!-- Toss Winner (DYNAMIC) -->
    <select id="toss_winner" class="form-control mb-2">
        <option value="">Select Toss Winner</option>
    </select>

    <!-- Toss Decision -->
    <select id="toss_decision" class="form-control mb-2">
        <option value="">Select Toss Decision</option>
        <option value="bat">Bat</option>
        <option value="field">Field</option>
    </select>

    <!-- Venue -->
    <select id="venue" class="form-control mb-2">
        <option value="">Select Venue</option>
        {% for v in venues %}
        <option value="{{v}}">{{v}}</option>
        {% endfor %}
    </select>

    <button class="btn btn-primary w-100" onclick="predictWinner()">Predict Winner</button>

    <h4 class="mt-3 text-center" id="result"></h4>

</div>

<!-- JS -->
<script>
    function updateTossTeams() {
        const t1 = document.getElementById("team1").value;
        const t2 = document.getElementById("team2").value;
        const toss = document.getElementById("toss_winner");

        // Reset dropdown
        toss.innerHTML = '<option value="">Select Toss Winner</option>';

        if (t1 && t2 && t1 !== t2) {
            toss.innerHTML += `<option value="${t1}">${t1}</option>`;
            toss.innerHTML += `<option value="${t2}">${t2}</option>`;
        }
    }
</script>

{% endblock %}
