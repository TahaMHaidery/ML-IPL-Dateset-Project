<!DOCTYPE html>
<html lang="en">

<head>
    <title>IPL Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

    <div class="d-flex">

        <!-- Sidebar -->
        <div class="sidebar">
            <h3>🏏 IPL</h3>
            <a href="/">Dashboard</a>
            <a href="/winner">Winner Prediction</a>
            <a href="/toss">Toss Prediction</a>
            <a href="/score">Score Prediction</a>
            <a href="/player">Player</a>
            <a href="/h2h">Head-to-Head</a>

        </div>

        <!-- Content -->
        <div class="content p-4">
            <div id="errorBox" class="alert alert-danger d-none text-center"></div>
            {% block content %}{% endblock %}
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
