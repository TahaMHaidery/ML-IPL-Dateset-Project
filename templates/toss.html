{% extends "base.html" %}
{% block content %}

<h2>🎲 Toss Prediction</h2>

<div class="card p-4">

    <!-- Team 1 -->
    <select id="t1" class="form-control mb-3">
        <option value="">Select Team 1</option>
        {% for t in teams %}
        <option value="{{t}}">{{t}}</option>
        {% endfor %}
    </select>

    <!-- Team 2 -->
    <select id="t2" class="form-control mb-3">
        <option value="">Select Team 2</option>
        {% for t in teams %}
        <option value="{{t}}">{{t}}</option>
        {% endfor %}
    </select>

    <!-- Button -->
    <button class="btn btn-success w-100" onclick="predictToss()">
        Predict Toss
    </button>

    <!-- Result -->
    <div class="text-center mt-4">
        <h4 id="toss_result"></h4>
    </div>

</div>

<!-- JS Validation -->
<script>
    function predictToss() {
        const team1 = document.getElementById("t1").value;
        const team2 = document.getElementById("t2").value;

        if (!team1 || !team2) {
            alert("Please select both teams!");
            return;
        }

        if (team1 === team2) {
            alert("Teams must be different!");
            return;
        }

        fetch("/predict_toss", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                team1: team1,
                team2: team2
            })
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById("toss_result").innerHTML =
                    "🏆 Toss Winner: <b>" + data.toss_winner + "</b>";
            });
    }
</script>

{% endblock %}
